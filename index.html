<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>產品判斷情境調研｜Lion Travel</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;500;700;900&family=IBM+Plex+Sans+TC:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #1a1815;
    --ink-soft: #4a453e;
    --paper: #f5f1ea;
    --paper-dim: #ebe5d9;
    --accent: #b8341c;
    --accent-soft: #d96d4a;
    --line: #2a2620;
    --warn: #c87a0a;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body {
    font-family: 'IBM Plex Sans TC', sans-serif;
    background: var(--paper);
    color: var(--ink);
    line-height: 1.7;
    font-size: 16px;
    background-image: radial-gradient(circle at 1px 1px, rgba(26,24,21,0.05) 1px, transparent 0);
    background-size: 24px 24px;
    min-height: 100vh;
  }
  .container { max-width: 760px; margin: 0 auto; padding: 32px 24px 120px; }

  .eyebrow {
    font-size: 12px; letter-spacing: 0.3em; text-transform: uppercase;
    color: var(--accent); font-weight: 500; margin-bottom: 12px;
  }
  h1 {
    font-family: 'Noto Serif TC', serif;
    font-size: clamp(26px, 4.5vw, 38px);
    font-weight: 900; line-height: 1.2; margin-bottom: 14px;
  }
  h1 .accent { color: var(--accent); }
  .lede { font-size: 15px; color: var(--ink-soft); max-width: 600px; margin-bottom: 16px; }
  .meta { display: flex; gap: 20px; font-size: 12px; color: var(--ink-soft); flex-wrap: wrap; }
  .meta-item { display: flex; align-items: center; gap: 6px; }
  .meta-item::before {
    content: ''; width: 5px; height: 5px; background: var(--accent); border-radius: 50%;
  }

  /* Progress */
  .progress-wrap {
    position: sticky; top: 0; background: var(--paper);
    padding: 14px 0; margin-bottom: 24px; z-index: 10;
    border-bottom: 1px solid var(--paper-dim);
  }
  .progress-dots {
    display: flex; gap: 6px; margin-bottom: 8px;
  }
  .progress-dot {
    flex: 1; min-width: 0; height: 6px; background: var(--paper-dim);
    border: none; cursor: not-allowed; padding: 0;
    transition: all 0.2s ease;
  }
  .progress-dot.done { background: var(--accent-soft); cursor: pointer; }
  .progress-dot.done:hover { background: var(--accent); }
  .progress-dot.current { background: var(--ink); cursor: default; }
  .progress-info {
    display: flex; justify-content: space-between;
    font-size: 11px; color: var(--ink-soft); letter-spacing: 0.05em;
  }
  .progress-info strong { color: var(--ink); font-family: 'Noto Serif TC', serif; }

  /* Stage */
  .stage { min-height: 320px; animation: fadeSlide 0.3s ease-out; }
  @keyframes fadeSlide {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .stage.invalid .q-title { color: var(--accent); }

  .q-number {
    font-family: 'Noto Serif TC', serif; font-size: 12px;
    color: var(--accent); font-weight: 700;
    letter-spacing: 0.15em; margin-bottom: 8px;
  }
  .q-title {
    font-family: 'Noto Serif TC', serif;
    font-size: clamp(20px, 3.5vw, 26px);
    font-weight: 700; line-height: 1.4; margin-bottom: 8px;
  }
  .q-title .required { color: var(--accent); margin-left: 4px; }
  .q-hint {
    font-size: 13px; color: var(--ink-soft);
    margin-bottom: 20px; padding-left: 12px;
    border-left: 2px solid var(--paper-dim);
  }
  .q-hint strong { color: var(--ink); }
  .q-limit {
    display: inline-block; font-size: 11px;
    background: var(--ink); color: var(--paper);
    padding: 2px 8px; letter-spacing: 0.1em;
    margin-bottom: 12px; margin-right: 8px;
  }
  .q-counter {
    display: inline-block; font-size: 11px;
    color: var(--ink-soft); margin-bottom: 12px;
  }
  .q-counter.warn { color: var(--accent); font-weight: 600; }

  /* Choices */
  .choices { display: grid; grid-template-columns: 1fr; gap: 8px; }
  .choices.two-col { grid-template-columns: 1fr 1fr; }
  @media (max-width: 540px) { .choices.two-col { grid-template-columns: 1fr; } }
  .choice {
    position: relative; display: flex; align-items: flex-start;
    gap: 12px; padding: 14px 16px;
    background: white; border: 1px solid var(--paper-dim);
    cursor: pointer; transition: all 0.15s ease; user-select: none;
  }
  .choice:hover { border-color: var(--ink-soft); transform: translateX(2px); }
  .choice.selected {
    border-color: var(--accent); background: #fffaf6;
    box-shadow: 3px 3px 0 var(--accent);
  }
  .choice.disabled { opacity: 0.5; cursor: not-allowed; }
  .choice.disabled:hover { transform: none; border-color: var(--paper-dim); }
  .choice input {
    margin-top: 4px; accent-color: var(--accent);
    flex-shrink: 0; pointer-events: none;
  }
  .choice > * { pointer-events: none; }
  .choice-text { flex: 1; font-size: 15px; }
  .choice-desc {
    display: block; font-size: 12px; color: var(--ink-soft);
    margin-top: 4px; line-height: 1.5;
  }
  .choice-include {
    display: block; font-size: 12px; color: var(--ink-soft);
    margin-top: 6px; line-height: 1.5;
  }
  .choice-include::before {
    content: '包含：'; color: var(--accent);
    font-weight: 600; margin-right: 4px;
  }

  /* Scale */
  .scale { display: grid; grid-template-columns: 1fr; gap: 8px; }
  .scale-item {
    display: flex; align-items: center; gap: 16px;
    padding: 12px 16px; background: white;
    border: 1px solid var(--paper-dim);
    cursor: pointer; transition: all 0.15s ease;
  }
  .scale-item:hover { border-color: var(--ink-soft); }
  .scale-item.selected {
    border-color: var(--accent); background: #fffaf6;
    box-shadow: 3px 3px 0 var(--accent);
  }
  .scale-item > * { pointer-events: none; }
  .scale-num {
    font-family: 'Noto Serif TC', serif; font-size: 28px; font-weight: 900;
    color: var(--accent); width: 36px; text-align: center; flex-shrink: 0;
  }
  .scale-label { font-size: 14px; }

  /* Text input */
  .text-input, .textarea {
    width: 100%; padding: 12px 14px; background: white;
    border: 1px solid var(--paper-dim); font-family: inherit;
    font-size: 15px; color: var(--ink); transition: border-color 0.15s;
  }
  .text-input:focus, .textarea:focus { outline: none; border-color: var(--accent); }
  .textarea { resize: vertical; min-height: 110px; }
  .other-input {
    margin-top: 8px; width: 100%; font-size: 14px;
    padding: 8px 12px; border: 1px solid var(--paper-dim);
    background: white; font-family: inherit;
  }
  .other-input:focus { outline: none; border-color: var(--accent); }

  /* Q7 */
  .freetext-rows { display: flex; flex-direction: column; gap: 10px; }
  .freetext-row { display: flex; gap: 10px; align-items: center; }
  .freetext-num {
    width: 24px; font-family: 'Noto Serif TC', serif;
    font-weight: 700; color: var(--accent); flex-shrink: 0;
  }
  .freetext-row input { flex: 1; }
  .chip-zone {
    margin-top: 16px; padding: 14px;
    background: var(--paper-dim); border-left: 3px solid var(--accent);
  }
  .chip-zone-title {
    font-size: 12px; color: var(--ink); margin-bottom: 12px;
    letter-spacing: 0.05em; font-weight: 600;
  }
  .chip-group { margin-bottom: 12px; }
  .chip-group:last-child { margin-bottom: 0; }
  .chip-group-label {
    font-size: 11px; color: var(--ink-soft);
    margin-bottom: 6px; font-weight: 500; letter-spacing: 0.05em;
  }
  .chips { display: flex; flex-wrap: wrap; gap: 6px; }
  .chip {
    font-size: 13px; padding: 4px 10px; background: white;
    border: 1px solid var(--ink); cursor: pointer;
    transition: all 0.15s; font-family: inherit;
  }
  .chip:hover { background: var(--ink); color: var(--paper); }
  .chip-used { opacity: 0.35; text-decoration: line-through; cursor: not-allowed; }
  .chip-used:hover { background: white; color: var(--ink); }
  .text-input.dup-warn { border-color: var(--accent); background: #fff5f0; }

  /* Q9 */
  .rank-pool, .rank-selected { display: flex; flex-direction: column; gap: 8px; }
  .rank-section-title {
    font-size: 12px; color: var(--ink-soft);
    letter-spacing: 0.1em; margin: 16px 0 8px; text-transform: uppercase;
  }
  .rank-card {
    display: flex; align-items: center; gap: 12px;
    padding: 10px 12px; background: white;
    border: 1px solid var(--paper-dim); transition: all 0.15s;
  }
  .rank-card:hover { border-color: var(--ink-soft); }
  .rank-card.in-rank { background: #fffaf6; border-color: var(--accent); }
  .rank-badge {
    width: 26px; height: 26px; background: var(--ink); color: var(--paper);
    font-family: 'Noto Serif TC', serif; font-weight: 900;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; font-size: 13px;
  }
  .rank-card.in-rank .rank-badge { background: var(--accent); }
  .rank-content { flex: 1; min-width: 0; }
  .rank-title { font-weight: 600; font-size: 14px; }
  .rank-desc {
    font-size: 11px; color: var(--ink-soft);
    margin-top: 2px; line-height: 1.5;
  }
  .rank-actions { display: flex; gap: 4px; flex-shrink: 0; }
  .rank-btn {
    width: 30px; height: 30px;
    border: 1px solid var(--paper-dim); background: white;
    cursor: pointer; font-size: 14px;
    color: var(--ink-soft); font-family: inherit;
    transition: all 0.15s;
  }
  .rank-btn:hover { background: var(--ink); color: var(--paper); }
  .rank-btn:disabled { opacity: 0.3; cursor: not-allowed; }

  /* Nav */
  .nav-bar {
    margin-top: 36px; padding-top: 24px;
    border-top: 1px solid var(--paper-dim);
    display: flex; gap: 12px;
    justify-content: space-between; align-items: center;
  }
  .nav-btn {
    padding: 14px 26px; font-family: 'Noto Serif TC', serif;
    font-size: 15px; font-weight: 700; letter-spacing: 0.05em;
    cursor: pointer; transition: all 0.2s;
    border: 1px solid var(--ink); background: white;
    color: var(--ink); min-width: 120px;
  }
  .nav-btn:hover:not(:disabled) {
    background: var(--ink); color: var(--paper); transform: translateY(-2px);
  }
  .nav-btn:disabled { opacity: 0.3; cursor: not-allowed; }
  .nav-btn.primary { background: var(--ink); color: var(--paper); }
  .nav-btn.primary:hover:not(:disabled) {
    background: var(--accent); border-color: var(--accent);
    box-shadow: 0 4px 0 var(--ink);
  }
  .nav-btn.submit {
    background: var(--accent); color: var(--paper);
    border-color: var(--accent); font-size: 16px; padding: 16px 32px;
  }
  .nav-btn.submit:hover:not(:disabled) {
    background: var(--ink); border-color: var(--ink);
    transform: translateY(-2px); box-shadow: 0 4px 0 var(--accent);
  }
  .nav-hint { font-size: 11px; color: var(--ink-soft); letter-spacing: 0.05em; }

  .error-msg {
    color: var(--accent); font-size: 13px;
    margin-top: 10px; font-weight: 500;
  }

  .honeypot {
    position: absolute; left: -9999px;
    width: 1px; height: 1px; overflow: hidden;
  }

  .state-screen { text-align: center; padding: 80px 20px; }
  .state-screen h2 {
    font-family: 'Noto Serif TC', serif;
    font-size: 32px; margin-bottom: 16px;
  }
  .state-screen p { color: var(--ink-soft); margin-bottom: 24px; }
  .hidden { display: none !important; }

  .spinner {
    display: inline-block; width: 24px; height: 24px;
    border: 3px solid var(--paper-dim);
    border-top-color: var(--accent);
    border-radius: 50%; animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .welcome-screen .start-btn {
    background: var(--accent); color: var(--paper);
    border: none; padding: 18px 48px;
    font-family: 'Noto Serif TC', serif;
    font-size: 17px; font-weight: 700;
    letter-spacing: 0.1em; cursor: pointer;
    transition: all 0.2s; margin-top: 24px;
  }
  .welcome-screen .start-btn:hover {
    background: var(--ink); transform: translateY(-2px);
    box-shadow: 0 4px 0 var(--accent);
  }

  .kbd-hint {
    font-size: 11px; color: var(--ink-soft);
    margin-top: 16px; text-align: center; letter-spacing: 0.03em;
  }
  .kbd-hint kbd {
    background: var(--paper-dim); padding: 1px 6px;
    font-family: monospace; font-size: 11px; border-radius: 2px;
  }

  @media (max-width: 540px) {
    .container { padding: 20px 16px 80px; }
    .nav-btn { min-width: 100px; padding: 12px 18px; font-size: 14px; }
    .nav-btn.submit { padding: 14px 24px; font-size: 15px; }
  }
</style>
</head>
<body>

<div class="container">

  <!-- WELCOME -->
  <div id="welcome-screen" class="state-screen welcome-screen">
    <div class="eyebrow" style="margin-bottom: 16px;">Lion Travel · Product Intelligence</div>
    <h1 style="margin-bottom: 20px;">產品判斷情境<span class="accent">調研</span></h1>
    <p class="lede" style="margin: 0 auto 12px; max-width: 540px;">這份調研將協助我們找出「判斷產品時，最該優先整理出來的資訊類型」。請依照你的實際工作經驗作答。</p>
    <div class="meta" style="justify-content: center; margin-bottom: 8px;">
      <span class="meta-item">共 11 題</span>
      <span class="meta-item">約 8-12 分鐘</span>
      <span class="meta-item">無敏感資訊</span>
    </div>
    <button class="start-btn" id="startBtn">開始作答</button>
    <p class="kbd-hint" style="margin-top: 32px;">
      作答中可按 <kbd>Enter</kbd> 下一題、<kbd>Esc</kbd> 上一題
    </p>
  </div>

  <!-- FORM -->
  <div id="form-screen" class="hidden">
    <div class="progress-wrap">
      <div class="progress-dots" id="progressDots"></div>
      <div class="progress-info">
        <span><strong id="currentNum">1</strong> / 11 題</span>
        <span id="progressText">已完成 0 題</span>
      </div>
    </div>

    <div class="stage" id="stage"></div>

    <div class="nav-bar">
      <button class="nav-btn" id="prevBtn">← 上一題</button>
      <span class="nav-hint" id="navHint"></span>
      <button class="nav-btn primary" id="nextBtn">下一題 →</button>
    </div>

    <div class="honeypot">
      <label>Leave this empty: <input type="text" id="website" name="website" tabindex="-1" autocomplete="off"></label>
    </div>
  </div>

  <!-- LOADING -->
  <div id="loading-screen" class="state-screen hidden">
    <div class="spinner"></div>
    <h2 style="margin-top:24px;">送出中...</h2>
    <p>請稍候，正在同步資料</p>
  </div>

  <!-- SUCCESS -->
  <div id="success-screen" class="state-screen hidden">
    <div style="font-family:'Noto Serif TC',serif; font-size:64px; color:var(--accent); margin-bottom:16px;">✓</div>
    <h2>謝謝你的填答</h2>
    <p>你的回應已成功送出，將協助我們把產品資訊整理得更貼近現場需求。</p>
  </div>

  <!-- ERROR -->
  <div id="error-screen" class="state-screen hidden">
    <div style="font-family:'Noto Serif TC',serif; font-size:48px; color:var(--accent); margin-bottom:16px;">!</div>
    <h2>送出失敗</h2>
    <p id="error-detail">資料未能送達，請稍後再試或聯絡負責窗口。</p>
    <button class="nav-btn primary" id="retryBtn" style="max-width:200px;">重試</button>
  </div>

  <!-- DUP -->
  <div id="dup-screen" class="state-screen hidden">
    <div style="font-family:'Noto Serif TC',serif; font-size:48px; color:var(--warn); margin-bottom:16px;">◐</div>
    <h2>你已填過這份問卷</h2>
    <p>感謝你的支持。本問卷每人限填一次。</p>
    <button class="nav-btn" id="forceFillBtn" style="max-width:300px;">我要重新填答（覆蓋舊資料）</button>
  </div>

</div>

<script>
  const GAS_URL = 'https://script.google.com/macros/s/AKfycby6ibP9IAXgyQkyZuMXhfIAZ23NfFuSc1as_7_xTvsTRQ5j8xRhClwyFJQXTdGSolNQ/exec';
  const STORAGE_KEY = 'lion_product_survey_v3';
  const TOTAL_Q = 11;

  const PRODUCT_LINES = ['東北亞','大陸港澳','東南亞','美加','紐澳','亞非','國旅','郵輪','國外鐵道','高爾夫','運動旅遊','璽品'];

  const ROLES = [
    { v: 'RC/TP', label: 'RC / TP', desc: '產品規劃、行程設計、資源配置、成本或售價規劃' },
    { v: 'OP', label: 'OP', desc: '出團作業、文件、名單、履約、異動與交付' },
    { v: '業務', label: '業務', desc: '客戶需求理解、產品說明、銷售推進與成交' },
    { v: '主管/管理職', label: '主管 / 管理職', desc: '審核、決策、管理或跨單位協調' },
  ];

  const Q5_OPTIONS = [
    { v: '對外說明或推薦產品', include: '向客人說明、幫客人挑產品、回答產品疑問' },
    { v: '比較產品差異', include: '比較相似團、解釋價格差異、找出賣點差異' },
    { v: '判斷銷售機會', include: '是否適合主推、是否值得曝光、是否有成交機會' },
    { v: '確認產品內容與設計', include: '內容是否完整、行程是否合理、產品設計是否清楚' },
    { v: '判斷作業或履約風險', include: '出團條件、異動、例外、客訴、履約風險' },
    { v: '協助內部理解或交接', include: '新人理解、跨部門說明、同仁詢問' },
  ];

  const Q7_CHIP_GROUPS = [
    { label: '銷售狀態', items: ['團位','成團','截止'] },
    { label: '價格內容', items: ['價格','優惠','包含項目'] },
    { label: '行程體驗', items: ['景點','亮點','強度'] },
    { label: '交通住宿', items: ['航班','飯店','餐食'] },
    { label: '限制風險', items: ['購物','自費','簽證','特殊限制'] },
    { label: '客群差異', items: ['親子','樂齡','蜜月','首訪'] },
  ];

  const Q9_OPTIONS = [
    { id: 'A', title: '基本條件', desc: '目的地、天數、團型' },
    { id: 'B', title: '日期與銷售狀態', desc: '出發日、團位、成團' },
    { id: 'C', title: '價格與內容', desc: '價格、優惠、包含項目' },
    { id: 'D', title: '航班交通', desc: '航班、轉機、交通' },
    { id: 'E', title: '行程亮點', desc: '景點、活動、體驗' },
    { id: 'F', title: '住宿餐食', desc: '飯店、餐食、連泊' },
    { id: 'G', title: '服務作業', desc: '領隊、簽證、文件' },
    { id: 'H', title: '限制風險', desc: '購物、自費、限制' },
    { id: 'I', title: '適合對象', desc: '親子、樂齡、首訪' },
    { id: 'J', title: '產品差異', desc: '相似團差在哪' },
  ];

  const Q10_OPTIONS = [
    { v: '產品賣點與差異', include: '主要賣點、相似產品差異、適合客群' },
    { v: '價格與銷售條件', include: '價格差異、優惠條件、包含／不包含項目' },
    { v: '團位與出團狀態', include: '可報名狀態、成團條件、出團條件、截止狀態' },
    { v: '交通與住宿餐食', include: '航班、交通、飯店、住宿規格、餐食規格' },
    { v: '行程內容與體驗強度', include: '景點重點、行程亮點、行程強度、體力負擔' },
    { v: '限制與注意事項', include: '購物、自費、簽證、證件、年齡或特殊限制' },
    { v: '作業或履約風險', include: '異動風險、履約問題、現場交付、例外狀況' },
    { v: '系統資料問題', include: '資料找不到、資料分散、系統資料不足' },
    { v: '很少遇到不清楚', include: '' },
  ];

  const Q11_REASONS = [
    '系統沒有這類資訊','系統有，但位置分散','系統有，但內容不夠清楚',
    '資訊會變動，需要問人才準','我不確定該問誰','這不是我平常負責判斷的範圍','其他',
  ];

  const state = {
    q1: [], q1Other: '',
    q2: null, q2Other: '',
    q3: null,
    q4: null, q4Other: '',
    q5: [], q5Other: '',
    q6Scenario: null, q6: '',
    q7: ['','','','',''],
    q8: '',
    q9: [],
    q10: [], q10Other: '',
    q11: null, q11Other: '',
  };

  let currentQ = 1;
  let startTime = Date.now();

  function isQDone(n) {
    switch (n) {
      case 1: return state.q1.length > 0 && (!state.q1.includes('其他') || state.q1Other.trim());
      case 2: return state.q2 && (state.q2 !== '其他' || state.q2Other.trim());
      case 3: return state.q3 !== null;
      case 4: return state.q4 && (state.q4 !== '其他' || state.q4Other.trim());
      case 5: return state.q5.length > 0 && (!state.q5.includes('其他') || state.q5Other.trim());
      case 6: return !!state.q6Scenario && state.q6.trim().length >= 5;
      case 7: return state.q7.some(x => x.trim());
      case 8: return state.q8.trim().length >= 5;
      case 9: return state.q9.length === 5;
      case 10: return state.q10.length > 0 && (!state.q10.includes('其他') || state.q10Other.trim());
      case 11: return !!state.q11 && (state.q11 !== '其他' || state.q11Other.trim());
    }
  }
  function doneCount() {
    let c = 0;
    for (let i = 1; i <= TOTAL_Q; i++) if (isQDone(i)) c++;
    return c;
  }

  function renderProgress() {
    const dots = document.getElementById('progressDots');
    dots.innerHTML = '';
    for (let i = 1; i <= TOTAL_Q; i++) {
      const btn = document.createElement('button');
      btn.className = 'progress-dot';
      btn.title = `第 ${i} 題`;
      btn.type = 'button';
      const canJump = isQDone(i) || i < currentQ;
      if (canJump) btn.classList.add('done');
      if (i === currentQ) btn.classList.add('current');
      btn.addEventListener('click', () => {
        if (canJump && i !== currentQ) goTo(i);
      });
      dots.appendChild(btn);
    }
    document.getElementById('currentNum').textContent = currentQ;
    document.getElementById('progressText').textContent = `已完成 ${doneCount()} 題`;
  }

  function renderStage() {
    const stage = document.getElementById('stage');
    stage.classList.remove('invalid');
    stage.style.animation = 'none';
    void stage.offsetWidth;
    stage.style.animation = '';

    const tpls = { 1:tplQ1, 2:tplQ2, 3:tplQ3, 4:tplQ4, 5:tplQ5, 6:tplQ6, 7:tplQ7, 8:tplQ8, 9:tplQ9, 10:tplQ10, 11:tplQ11 };
    const binds = { 1:bindQ1, 2:bindQ2, 3:bindQ3, 4:bindQ4, 5:bindQ5, 6:bindQ6, 7:bindQ7, 8:bindQ8, 9:bindQ9, 10:bindQ10, 11:bindQ11 };
    stage.innerHTML = tpls[currentQ]();
    binds[currentQ]();

    document.getElementById('prevBtn').disabled = currentQ === 1;
    const nextBtn = document.getElementById('nextBtn');
    const navHint = document.getElementById('navHint');
    if (currentQ === TOTAL_Q) {
      nextBtn.textContent = '送出問卷';
      nextBtn.classList.add('submit');
      navHint.textContent = '送出後將同步至內部試算表';
    } else {
      nextBtn.textContent = '下一題 →';
      nextBtn.classList.remove('submit');
      navHint.textContent = '';
    }
    renderProgress();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  /* ===== Templates & Bindings ===== */
  function tplQ1() {
    const all = [...PRODUCT_LINES, '其他'];
    return `
      <div class="q-number">問題 01 / 11</div>

      <span class="q-counter" id="q1-counter">已選 ${state.q1.length} / 3</span>
      <div class="choices two-col" id="q1-choices">
        ${all.map(v => `
          <div class="choice ${state.q1.includes(v) ? 'selected' : ''}" data-val="${v}">
            <input type="checkbox" tabindex="-1" ${state.q1.includes(v) ? 'checked' : ''}>
            <span class="choice-text">${v}</span>
          </div>`).join('')}
      </div>
      <input type="text" class="other-input ${state.q1.includes('其他') ? '' : 'hidden'}" id="q1-other" placeholder="請填寫其他產品線" value="${state.q1Other}">
      <div class="error-msg hidden" id="q-error">請至少選擇一項</div>`;
  }
  function bindQ1() {
    const wrap = document.getElementById('q1-choices');
    const otherInput = document.getElementById('q1-other');
    wrap.querySelectorAll('.choice').forEach(el => {
      el.addEventListener('click', () => {
        const v = el.dataset.val;
        const has = state.q1.includes(v);
        if (has) state.q1 = state.q1.filter(x => x !== v);
        else if (state.q1.length < 3) state.q1.push(v);
        else return;
        const now = state.q1.includes(v);
        el.classList.toggle('selected', now);
        el.querySelector('input').checked = now;
        otherInput.classList.toggle('hidden', !state.q1.includes('其他'));
        const c = document.getElementById('q1-counter');
        c.textContent = `已選 ${state.q1.length} / 3`;
        c.classList.toggle('warn', state.q1.length >= 3);
        renderProgress();
      });
    });
    otherInput.addEventListener('input', e => { state.q1Other = e.target.value; renderProgress(); });
  }

  function tplQ2() {
    const fromQ1 = state.q1.filter(x => x !== '其他');

  function tplQ6() {

  function tplQ7() {

  function bindQ7() {
    function isDup(val, idx) {
      const v = val.trim();
      if (!v) return false;
      return state.q7.some((x, i) => i !== idx && x.trim() === v);
    }
    function refresh() {
      document.querySelectorAll('.q7-input').forEach((inp, i) => {
        inp.classList.toggle('dup-warn', isDup(state.q7[i], i));
      });
      const used = new Set(state.q7.map(x => x.trim()).filter(Boolean));
      document.querySelectorAll('.chip-zone .chip').forEach(btn => {
        btn.classList.toggle('chip-used', used.has(btn.dataset.val));
      });
    }
    document.querySelectorAll('.q7-input').forEach(el => {
      el.addEventListener('input', e => {
        state.q7[parseInt(el.dataset.idx)] = e.target.value;
        refresh(); renderProgress();
      });

    document.querySelectorAll('.chip-zone .chip').forEach(btn => {

        state.q7[idx] = v;

        refresh(); renderProgress();
      });
    });
    refresh();
  }

  function tplQ9() {
    return `
      <div class="q-number">問題 09 / 11</div>
      <h2 class="q-title">依照你在 Q6 描述的判斷情境，哪 5 類資訊最能幫助你做出判斷？<span class="required">*</span></h2>
      <p class="q-hint"><strong>請以「我實際判斷時最需要哪些資訊」來排序，而不是「公司應該整理什麼」。</strong>點 ＋ 加入排序、用 ▲▼ 調整順序。</p>
      <div class="rank-section-title">你的排序（第 1-5 名）</div>

  }
  function bindQ9() {
    const pool = document.getElementById('q9-pool');
    const ranked = document.getElementById('q9-ranked');
    function repaint() {
      if (state.q9.length === 0) {
        ranked.innerHTML = `
          <div class="rank-card" style="opacity:0.5; border-style:dashed;">
            <div class="rank-content"><div class="rank-desc" style="margin-top:0;">尚未選擇任何項目</div></div>
          </div>`;
      } else {
        ranked.innerHTML = state.q9.map((id, idx) => {
          const item = Q9_OPTIONS.find(o => o.id === id);
          return `
            <div class="rank-card in-rank" data-id="${id}">
              <div class="rank-badge">${idx+1}</div>
              <div class="rank-content">
                <div class="rank-title">${item.title}</div>
                <div class="rank-desc">${item.desc}</div>
              </div>
              <div class="rank-actions">
                <button class="rank-btn" data-act="up" data-id="${id}" ${idx === 0 ? 'disabled' : ''}>▲</button>
                <button class="rank-btn" data-act="down" data-id="${id}" ${idx === state.q9.length - 1 ? 'disabled' : ''}>▼</button>
                <button class="rank-btn" data-act="remove" data-id="${id}">✕</button>
              </div>
            </div>`;
        }).join('');
      }
      const available = Q9_OPTIONS.filter(o => !state.q9.includes(o.id));
      pool.innerHTML = available.map(item => `
        <div class="rank-card" data-id="${item.id}">
          <div class="rank-content">
            <div class="rank-title">${item.title}</div>
            <div class="rank-desc">${item.desc}</div>
          </div>
          <div class="rank-actions">
            <button class="rank-btn" data-act="add" data-id="${item.id}" ${state.q9.length >= 5 ? 'disabled' : ''}>＋</button>
          </div>
        </div>`).join('');
      document.querySelectorAll('#q9-ranked .rank-btn, #q9-pool .rank-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          const id = btn.dataset.id;
          const act = btn.dataset.act;
          const idx = state.q9.indexOf(id);
          if (act === 'add' && state.q9.length < 5) state.q9.push(id);
          else if (act === 'remove') state.q9.splice(idx, 1);
          else if (act === 'up' && idx > 0) [state.q9[idx-1], state.q9[idx]] = [state.q9[idx], state.q9[idx-1]];
          else if (act === 'down' && idx < state.q9.length - 1) [state.q9[idx+1], state.q9[idx]] = [state.q9[idx], state.q9[idx+1]];
          repaint();
          renderProgress();
        });
      });
    }
    repaint();
  }

  function tplQ10() {
    const all = [...Q10_OPTIONS, { v: '其他', include: '' }];
    return `
      <div class="q-number">問題 10 / 11</div>
      <h2 class="q-title">哪些資訊你最常覺得不清楚、需要再確認，或需要問其他人？<span class="required">*</span></h2>
      <p class="q-hint">複選，最多 5 項。請就「最常」覺得不清楚的類別選擇。</p>
      <span class="q-limit">最多 5 項</span>
      <span class="q-counter" id="q10-counter">已選 ${state.q10.length} / 5</span>
      <div class="choices" id="q10-choices">
        ${all.map(opt => `
          <div class="choice ${state.q10.includes(opt.v) ? 'selected' : ''}" data-val="${opt.v}">
            <input type="checkbox" tabindex="-1" ${state.q10.includes(opt.v) ? 'checked' : ''}>
            <span class="choice-text">
              ${opt.v}
              ${opt.include ? `<span class="choice-include">${opt.include}</span>` : ''}
            </span>
          </div>`).join('')}
      </div>
      <input type="text" class="other-input ${state.q10.includes('其他') ? '' : 'hidden'}" id="q10-other" placeholder="請填寫其他" value="${state.q10Other}">
      <div class="error-msg hidden" id="q-error">請至少選擇一項</div>`;
  }
  function bindQ10() {
    const wrap = document.getElementById('q10-choices');
    const otherInput = document.getElementById('q10-other');
    wrap.querySelectorAll('.choice').forEach(el => {
      el.addEventListener('click', () => {
        const v = el.dataset.val;
        const has = state.q10.includes(v);
        if (has) state.q10 = state.q10.filter(x => x !== v);
        else if (state.q10.length < 5) state.q10.push(v);
        else return;
        const now = state.q10.includes(v);
        el.classList.toggle('selected', now);
        el.querySelector('input').checked = now;
        otherInput.classList.toggle('hidden', !state.q10.includes('其他'));
        const c = document.getElementById('q10-counter');
        c.textContent = `已選 ${state.q10.length} / 5`;
        c.classList.toggle('warn', state.q10.length >= 5);
        renderProgress();
      });
    });
    otherInput.addEventListener('input', e => { state.q10Other = e.target.value; renderProgress(); });
  }

  function tplQ11() {
    return `
      <div class="q-number">問題 11 / 11</div>
      <h2 class="q-title">你最常需要再確認的「主要原因」是什麼？<span class="required">*</span></h2>
      <p class="q-hint">單選。這題幫助我們分辨「資料有沒有」、「找不找得到」、「看不看得懂」是不同問題。</p>
      <div class="choices" id="q11-choices">
        ${Q11_REASONS.map(r => `
          <div class="choice ${state.q11 === r ? 'selected' : ''}" data-val="${r}">
            <input type="radio" name="q11" tabindex="-1" ${state.q11 === r ? 'checked' : ''}>
            <span class="choice-text">${r}</span>
          </div>`).join('')}
      </div>
      <input type="text" class="other-input ${state.q11 === '其他' ? '' : 'hidden'}" id="q11-other" placeholder="請填寫其他原因" value="${state.q11Other}">
      <div class="error-msg hidden" id="q-error">請選擇一項</div>`;
  }
  function bindQ11() {
    const wrap = document.getElementById('q11-choices');
    const otherInput = document.getElementById('q11-other');
    wrap.querySelectorAll('.choice').forEach(el => {
      el.addEventListener('click', () => {
        wrap.querySelectorAll('.choice').forEach(x => {
          x.classList.remove('selected');
          x.querySelector('input').checked = false;
        });
        el.classList.add('selected');
        el.querySelector('input').checked = true;
        state.q11 = el.dataset.val;
        otherInput.classList.toggle('hidden', state.q11 !== '其他');
        renderProgress();
      });
    });
    otherInput.addEventListener('input', e => { state.q11Other = e.target.value; renderProgress(); });
  }

  /* Navigation */
  function goTo(n) {
    if (n < 1 || n > TOTAL_Q) return;
    if (n > currentQ && !isQDone(currentQ)) { showError(); return; }
    currentQ = n;
    renderStage();
  }
  function goNext() {
    if (!isQDone(currentQ)) { showError(); return; }
    if (currentQ === TOTAL_Q) { submit(); return; }
    currentQ++;
    renderStage();
  }
  function goPrev() {
    if (currentQ === 1) return;
    currentQ--;
    renderStage();
  }
  function showError() {
    const stage = document.getElementById('stage');
    stage.classList.add('invalid');
    const err = document.getElementById('q-error');
    if (err) err.classList.remove('hidden');
  }

  function buildPayload() {
    return {
      website: document.getElementById('website').value,
      submittedAt: new Date().toISOString(),
      durationMs: Date.now() - startTime,
      userAgent: navigator.userAgent.slice(0, 200),
      q1: state.q1.join('｜'), q1Other: state.q1Other.trim(),
      q2: state.q2 || '', q2Other: state.q2Other.trim(),
      q3: state.q3 || '',
      q4: state.q4 || '', q4Other: state.q4Other.trim(),
      q5: state.q5.join('｜'), q5Other: state.q5Other.trim(),
      q6Scenario: state.q6Scenario || '',
      q6: state.q6.trim(),
      q7_1: state.q7[0].trim(), q7_2: state.q7[1].trim(), q7_3: state.q7[2].trim(), q7_4: state.q7[3].trim(), q7_5: state.q7[4].trim(),
      q8: state.q8.trim(),
      q9_rank1: state.q9[0] || '', q9_rank2: state.q9[1] || '', q9_rank3: state.q9[2] || '', q9_rank4: state.q9[3] || '', q9_rank5: state.q9[4] || '',
      q10: state.q10.join('｜'), q10Other: state.q10Other.trim(),
      q11: state.q11 || '', q11Other: state.q11Other.trim(),
    };
  }

  async function submit() {
    let firstBad = null;
    for (let i = 1; i <= TOTAL_Q; i++) {
      if (!isQDone(i)) { firstBad = i; break; }
    }
    if (firstBad !== null) {
      currentQ = firstBad;
      renderStage();
      showError();
      return;
    }
    document.getElementById('form-screen').classList.add('hidden');
    document.getElementById('loading-screen').classList.remove('hidden');
    try {
      const res = await fetch(GAS_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
        body: JSON.stringify(buildPayload()),
        redirect: 'follow',
      });
      const data = await res.json();
      if (data.ok) {
        localStorage.setItem(STORAGE_KEY, JSON.stringify({ submittedAt: new Date().toISOString() }));
        document.getElementById('loading-screen').classList.add('hidden');
        document.getElementById('success-screen').classList.remove('hidden');
      } else {
        throw new Error(data.error || 'unknown');
      }
    } catch (err) {
      console.error(err);
      document.getElementById('loading-screen').classList.add('hidden');
      document.getElementById('error-screen').classList.remove('hidden');
      document.getElementById('error-detail').textContent = '資料未能送達：' + (err.message || '網路錯誤');
    }
  }

  function checkDup() {
    if (localStorage.getItem(STORAGE_KEY)) {
      document.getElementById('welcome-screen').classList.add('hidden');
      document.getElementById('dup-screen').classList.remove('hidden');
    }
  }

  document.addEventListener('DOMContentLoaded', () => {
    checkDup();
    document.getElementById('startBtn').addEventListener('click', () => {
      document.getElementById('welcome-screen').classList.add('hidden');
      document.getElementById('form-screen').classList.remove('hidden');
      startTime = Date.now();
      currentQ = 1;
      renderStage();
    });
    document.getElementById('prevBtn').addEventListener('click', goPrev);
    document.getElementById('nextBtn').addEventListener('click', goNext);
    document.getElementById('retryBtn').addEventListener('click', () => {
      document.getElementById('error-screen').classList.add('hidden');
      document.getElementById('form-screen').classList.remove('hidden');
    });
    document.getElementById('forceFillBtn').addEventListener('click', () => {
      localStorage.removeItem(STORAGE_KEY);
      document.getElementById('dup-screen').classList.add('hidden');
      document.getElementById('welcome-screen').classList.remove('hidden');
    });
    document.addEventListener('keydown', e => {
      const tag = (document.activeElement && document.activeElement.tagName) || '';
      if (tag === 'INPUT' || tag === 'TEXTAREA') {
        if (e.key === 'Escape') goPrev();
        return;
      }
      if (document.getElementById('form-screen').classList.contains('hidden')) return;
      if (e.key === 'Enter') { e.preventDefault(); goNext(); }
      else if (e.key === 'Escape') { e.preventDefault(); goPrev(); }
    });
  });
</script>

</body>
</html>
